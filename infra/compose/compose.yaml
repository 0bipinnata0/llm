services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: llm-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
      args:
        API_INTERNAL_URL: http://api:3001
    container_name: llm-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
